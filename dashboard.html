<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middle East News & Market Impact Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        header h1 {
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #2a5298;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 82, 152, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #1e3c72;
            font-size: 1.3em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .severity-critical {
            color: #dc3545;
            font-weight: bold;
        }
        
        .severity-high {
            color: #ff6b6b;
        }
        
        .severity-medium {
            color: #ffc107;
        }
        
        .severity-low {
            color: #28a745;
        }
        
        .story {
            border-left: 4px solid #2a5298;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        
        .story h3 {
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .story-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #666;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .tag {
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        
        .story p {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }
        
        .market-impact {
            display: grid;
            gap: 15px;
        }
        
        .impact-item {
            padding: 12px;
            background: #f0f7ff;
            border-left: 3px solid #2a5298;
            border-radius: 5px;
        }
        
        .impact-item strong {
            color: #1e3c72;
        }
        
        .risk-meter {
            width: 100%;
            height: 25px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .risk-level {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .risk-critical {
            width: 90%;
            background: linear-gradient(90deg, #dc3545, #c82333);
        }
        
        .risk-high {
            width: 75%;
            background: linear-gradient(90deg, #ff6b6b, #ff5252);
        }
        
        .risk-medium {
            width: 60%;
            background: linear-gradient(90deg, #ffc107, #ffb300);
        }
        
        .risk-low {
            width: 40%;
            background: linear-gradient(90deg, #28a745, #20c997);
        }
        
        .timestamp {
            color: #999;
            font-size: 0.85em;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .reports-list {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .reports-list h2 {
            color: #1e3c72;
            margin-bottom: 20px;
        }
        
        .report-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .report-item:hover {
            background: #f9f9f9;
        }
        
        .report-date {
            color: #1e3c72;
            font-weight: bold;
        }
        
        .report-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-ready {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Middle East News & Market Impact Dashboard</h1>
            <p>Real-time monitoring of geopolitical events and their economic impact</p>
            <div class="controls">
                <button class="btn-primary" onclick="loadLatestReport()">📊 Load Latest Report</button>
                <button class="btn-secondary" onclick="loadAllReports()">📁 View All Reports</button>
                <button class="btn-secondary" onclick="refreshDashboard()">🔄 Refresh</button>
            </div>
        </header>
        
        <div id="content">
            <div class="empty-state">
                <p>Click "Load Latest Report" to see today's news summary and market impact analysis</p>
            </div>
        </div>
    </div>
    
    <script>
        // Sample data - Replace with actual data from your reports
        const sampleData = {
            date: new Date().toISOString().split('T')[0],
            generated: new Date().toLocaleString(),
            topStories: [
                {
                    id: 1,
                    headline: "US-Israeli Military Campaign",
                    region: "Iran",
                    severity: "Critical",
                    summary: "Significant escalation in military operations targeting Iranian leadership and strategic positions.",
                    impact: "Oil markets +8%, USD strengthens"
                },
                {
                    id: 2,
                    headline: "Strait of Hormuz Tensions",
                    region: "Persian Gulf",
                    severity: "Critical",
                    summary: "Iran threatens closure of critical shipping route; Trump proposes US Navy escort.",
                    impact: "Energy prices volatile, shipping costs up 150%"
                },
                {
                    id: 3,
                    headline: "Hezbollah Escalation",
                    region: "Lebanon",
                    severity: "High",
                    summary: "52+ casualties reported in Israeli strikes on Lebanese targets.",
                    impact: "Regional equity markets down 5%, credit spreads widen"
                },
                {
                    id: 4,
                    headline: "US Military Casualties",
                    region: "Middle East",
                    severity: "High",
                    summary: "6 soldiers killed in friendly fire incident during operations.",
                    impact: "Defense sector mixed, geopolitical risk premium increases"
                },
                {
                    id: 5,
                    headline: "Civilian Crisis Developing",
                    region: "Iran & UAE",
                    severity: "High",
                    summary: "Food shortages in Tehran; infrastructure damage reported in UAE.",
                    impact: "Agricultural commodity prices rise, humanitarian concerns"
                }
            ],
            marketImpact: {
                oil: { price: "$105-125/bbl", change: "+8 to 12%", outlook: "Volatile" },
                stocks: { change: "-2% to -8%", sectors: "Energy positive, Tech negative" },
                currencies: { change: "USD +2%, Rial -15%" },
                shipping: { costIncrease: "+100-300%", status: "Critical" },
                credit: { spread: "+50-75 bps", riskLevel: "High" }
            },
            riskAssessment: {
                level: 9,
                description: "Critical - Geopolitical tensions at highest levels",
                outlook48h: "Continued volatility expected, potential further escalation",
                outlook1w: "Market stabilization possible if tensions ease, otherwise continued pressure"
            }
        };
        
        function loadLatestReport() {
            const html = `
                <div class="dashboard">
                    ${sampleData.topStories.map(story => `
                        <div class="card">
                            <h2>
                                <span class="severity-${story.severity.toLowerCase()}">${story.severity}</span>
                            </h2>
                            <div class="story">
                                <h3>${story.headline}</h3>
                                <div class="story-meta">
                                    <span class="tag">📍 ${story.region}</span>
                                    <span class="tag severity-${story.severity.toLowerCase()}">⚠️ ${story.severity}</span>
                                </div>
                                <p>${story.summary}</p>
                                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd; color: #2a5298; font-weight: 600;">
                                    💹 ${story.impact}
                                </div>
                            </div>
                            <div class="timestamp">Generated: ${sampleData.generated}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="card">
                    <h2>📊 Market Impact Analysis</h2>
                    <div class="market-impact">
                        <div class="impact-item">
                            <strong>🛢️ Oil Markets:</strong><br/>
                            Price: ${sampleData.marketImpact.oil.price}<br/>
                            Change: ${sampleData.marketImpact.oil.change}<br/>
                            Outlook: ${sampleData.marketImpact.oil.outlook}
                        </div>
                        <div class="impact-item">
                            <strong>📈 Stock Markets:</strong><br/>
                            Change: ${sampleData.marketImpact.stocks.change}<br/>
                            Sectors: ${sampleData.marketImpact.stocks.sectors}
                        </div>
                        <div class="impact-item">
                            <strong>💱 Currency Markets:</strong><br/>
                            ${sampleData.marketImpact.currencies.change}
                        </div>
                        <div class="impact-item">
                            <strong>🚢 Shipping:</strong><br/>
                            Cost Increase: ${sampleData.marketImpact.shipping.costIncrease}<br/>
                            Status: ${sampleData.marketImpact.shipping.status}
                        </div>
                        <div class="impact-item">
                            <strong>💳 Credit Markets:</strong><br/>
                            Spread Widening: ${sampleData.marketImpact.credit.spread}<br/>
                            Risk Level: ${sampleData.marketImpact.credit.riskLevel}
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>⚠️ Risk Assessment</h2>
                    <div class="risk-meter">
                        <div class="risk-level risk-critical" style="width: ${sampleData.riskAssessment.level * 10}%">
                            ${sampleData.riskAssessment.level}/10
                        </div>
                    </div>
                    <p style="margin-top: 15px; color: #dc3545; font-weight: bold;">
                        ${sampleData.riskAssessment.description}
                    </p>
                    <div class="market-impact" style="margin-top: 15px;">
                        <div class="impact-item">
                            <strong>48-72 Hour Outlook:</strong><br/>
                            ${sampleData.riskAssessment.outlook48h}
                        </div>
                        <div class="impact-item">
                            <strong>1-2 Week Outlook:</strong><br/>
                            ${sampleData.riskAssessment.outlook1w}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }
        
        function loadAllReports() {
            const reports = [
                { date: new Date().toISOString().split('T')[0], status: 'Ready' },
                { date: new Date(Date.now() - 86400000).toISOString().split('T')[0], status: 'Ready' },
                { date: new Date(Date.now() - 172800000).toISOString().split('T')[0], status: 'Ready' }
            ];
            
            const html = `
                <div class="reports-list">
                    <h2>📋 All Reports</h2>
                    ${reports.map(report => `
                        <div class="report-item">
                            <div>
                                <div class="report-date">${report.date}</div>
                                <small style="color: #999;">Middle East Daily News & Market Impact</small>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <span class="report-status status-${report.status.toLowerCase()}">${report.status}</span>
                                <button class="btn-secondary" onclick="alert('Download: MIDDLE_EAST_DAILY_REPORT_${report.date}.md')">📥 Download</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }
        
        function refreshDashboard() {
            loadLatestReport();
        }
        
        // Load latest report on page load
        window.addEventListener('load', loadLatestReport);
    </script>
</body>
</html>
