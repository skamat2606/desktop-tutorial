<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    /* ── Nav ── */
    .site-nav {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 200;
    }
    .site-nav .brand { color: #38bdf8; font-size: 18px; font-weight: 700; text-decoration: none; }
    .site-nav .brand span { color: #94a3b8; font-weight: 400; }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: #94a3b8; text-decoration: none; padding: 8px 16px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      transition: background 0.2s, color 0.2s;
    }
    .nav-links a:hover { background: #334155; color: #e2e8f0; }
    .nav-links a.active { background: #38bdf8; color: #0f172a; }

    /* ── Header ── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      color: #38bdf8;
      letter-spacing: 1px;
    }

    header h1 span {
      color: #94a3b8;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
    }
    .btn-primary:hover { background: #7dd3fc; }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover { background: #475569; }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover { background: #f87171; }

    .btn-success {
      background: #10b981;
      color: #fff;
    }
    .btn-success:hover { background: #34d399; }

    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Blog List View ── */
    .blog-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .blog-list-header h2 {
      color: #cbd5e1;
      font-size: 20px;
    }

    .search-bar {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      width: 260px;
      font-family: inherit;
    }

    .search-bar:focus {
      border-color: #38bdf8;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #64748b;
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #94a3b8;
    }

    .empty-state p {
      margin-bottom: 24px;
      font-size: 15px;
    }

    /* ── Blog Cards ── */
    .blog-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .blog-card:hover {
      border-color: #38bdf8;
      transform: translateY(-2px);
    }

    .blog-card .card-date {
      color: #38bdf8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .blog-card .card-title {
      color: #f1f5f9;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .blog-card .card-preview {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-card .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #334155;
    }

    .blog-card .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: #334155;
      color: #94a3b8;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-actions button {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .card-actions button:hover {
      color: #e2e8f0;
      background: #334155;
    }

    .card-actions button.delete-btn:hover {
      color: #ef4444;
    }

    /* ── Editor View ── */
    .editor-view {
      display: none;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .editor-header h2 {
      color: #cbd5e1;
      font-size: 20px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #38bdf8;
    }

    .form-group input.title-input {
      font-size: 24px;
      font-weight: 700;
      padding: 16px;
    }

    .form-group textarea {
      min-height: 400px;
      line-height: 1.8;
      resize: vertical;
    }

    .form-group .hint {
      color: #64748b;
      font-size: 12px;
      margin-top: 6px;
    }

    /* ── Read View ── */
    .read-view {
      display: none;
    }

    .read-header {
      margin-bottom: 32px;
    }

    .read-header .back-link {
      color: #38bdf8;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      border: none;
      background: none;
      font-family: inherit;
    }

    .read-header .back-link:hover {
      color: #7dd3fc;
    }

    .read-header .read-date {
      color: #38bdf8;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .read-header h2 {
      color: #f1f5f9;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.3;
    }

    .read-tags {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .read-body {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .read-footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: #fff;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 200;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      min-width: 140px;
      text-align: center;
    }

    .stat .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #38bdf8;
    }

    .stat .stat-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .site-nav {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }

      header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .blog-list-header {
        flex-direction: column;
        gap: 12px;
      }

      .search-bar {
        width: 100%;
      }

      .stats-bar {
        flex-direction: column;
      }

      .editor-header {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a class="brand" href="index.html">MyApps <span>Suite</span></a>
    <div class="nav-links">
      <a href="index.html">Calculator</a>
      <a href="two-digit-calculator.html">2-Digit Calc</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="habit-tracker.html">Habits</a>
    </div>
  </nav>

  <header>
    <h1>Daily Blog <span>Journal</span></h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="showEditor()">+ New Post</button>
    </div>
  </header>

  <!-- ── Blog List View ── -->
  <div class="container list-view" id="listView">
    <div class="stats-bar" id="statsBar"></div>

    <div class="blog-list-header">
      <h2>Your Posts</h2>
      <input type="text" class="search-bar" id="searchInput" placeholder="Search posts..." oninput="renderPosts()">
    </div>

    <div id="postsContainer"></div>
  </div>

  <!-- ── Editor View ── -->
  <div class="container editor-view" id="editorView">
    <div class="editor-header">
      <h2 id="editorTitle">New Blog Post</h2>
      <div class="editor-actions">
        <button class="btn btn-secondary" onclick="showList()">Cancel</button>
        <button class="btn btn-success" onclick="savePost()">Save Post</button>
      </div>
    </div>

    <div class="form-group">
      <label>Title</label>
      <input type="text" class="title-input" id="postTitle" placeholder="Give your post a title...">
    </div>

    <div class="form-group">
      <label>Tags</label>
      <input type="text" id="postTags" placeholder="e.g. personal, tech, travel (comma separated)">
      <div class="hint">Separate multiple tags with commas</div>
    </div>

    <div class="form-group">
      <label>Content</label>
      <textarea id="postContent" placeholder="Write your blog post here..."></textarea>
    </div>
  </div>

  <!-- ── Read View ── -->
  <div class="container read-view" id="readView">
    <div class="read-header">
      <button class="back-link" onclick="showList()">&#8592; Back to all posts</button>
      <div class="read-date" id="readDate"></div>
      <h2 id="readTitle"></h2>
      <div class="read-tags" id="readTags"></div>
    </div>
    <div class="read-body" id="readBody"></div>
    <div class="read-footer">
      <button class="btn btn-secondary btn-sm" onclick="editCurrentPost()">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentPost()">Delete</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── State ──
    let posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
    let editingId = null;
    let viewingId = null;

    // ── Persistence ──
    function savePosts() {
      localStorage.setItem('blog_posts', JSON.stringify(posts));
    }

    // ── Navigation ──
    function showList() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('editorView').style.display = 'none';
      document.getElementById('readView').style.display = 'none';
      editingId = null;
      viewingId = null;
      renderPosts();
      renderStats();
    }

    function showEditor(id) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('editorView').style.display = 'block';
      document.getElementById('readView').style.display = 'none';

      if (id) {
        const post = posts.find(p => p.id === id);
        if (!post) return showList();
        editingId = id;
        document.getElementById('editorTitle').textContent = 'Edit Post';
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postTags').value = post.tags.join(', ');
        document.getElementById('postContent').value = post.content;
      } else {
        editingId = null;
        document.getElementById('editorTitle').textContent = 'New Blog Post';
        document.getElementById('postTitle').value = '';
        document.getElementById('postTags').value = '';
        document.getElementById('postContent').value = '';
      }

      document.getElementById('postTitle').focus();
    }

    function showRead(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;

      viewingId = id;
      document.getElementById('listView').style.display = 'none';
      document.getElementById('editorView').style.display = 'none';
      document.getElementById('readView').style.display = 'block';

      document.getElementById('readDate').textContent = formatDate(post.date);
      document.getElementById('readTitle').textContent = post.title;
      document.getElementById('readBody').textContent = post.content;

      const tagsContainer = document.getElementById('readTags');
      tagsContainer.innerHTML = post.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
    }

    // ── CRUD ──
    function savePost() {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const tagsRaw = document.getElementById('postTags').value;
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);

      if (!title) {
        showToast('Please enter a title', '#ef4444');
        document.getElementById('postTitle').focus();
        return;
      }

      if (!content) {
        showToast('Please write some content', '#ef4444');
        document.getElementById('postContent').focus();
        return;
      }

      if (editingId) {
        const idx = posts.findIndex(p => p.id === editingId);
        if (idx !== -1) {
          posts[idx].title = title;
          posts[idx].content = content;
          posts[idx].tags = tags;
          posts[idx].updatedAt = new Date().toISOString();
        }
        showToast('Post updated!');
      } else {
        const post = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title,
          content,
          tags,
          date: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        posts.unshift(post);
        showToast('Post published!');
      }

      savePosts();
      showList();
    }

    function deletePost(id, event) {
      if (event) event.stopPropagation();
      if (!confirm('Are you sure you want to delete this post?')) return;
      posts = posts.filter(p => p.id !== id);
      savePosts();
      showToast('Post deleted', '#ef4444');
      showList();
    }

    function editCurrentPost() {
      if (viewingId) showEditor(viewingId);
    }

    function deleteCurrentPost() {
      if (viewingId) deletePost(viewingId);
    }

    // ── Rendering ──
    function renderPosts() {
      const container = document.getElementById('postsContainer');
      const query = document.getElementById('searchInput').value.toLowerCase();

      let filtered = posts;
      if (query) {
        filtered = posts.filter(p =>
          p.title.toLowerCase().includes(query) ||
          p.content.toLowerCase().includes(query) ||
          p.tags.some(t => t.toLowerCase().includes(query))
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">${query ? '&#128269;' : '&#128221;'}</div>
            <h3>${query ? 'No matching posts' : 'No blog posts yet'}</h3>
            <p>${query ? 'Try a different search term' : 'Start writing your first daily blog post!'}</p>
            ${!query ? '<button class="btn btn-primary" onclick="showEditor()">Write Your First Post</button>' : ''}
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(post => `
        <div class="blog-card" onclick="showRead('${post.id}')">
          <div class="card-date">${formatDate(post.date)}</div>
          <div class="card-title">${escapeHtml(post.title)}</div>
          <div class="card-preview">${escapeHtml(post.content)}</div>
          <div class="card-footer">
            <div class="card-tags">
              ${post.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
            </div>
            <div class="card-actions">
              <button title="Edit" onclick="event.stopPropagation(); showEditor('${post.id}')">&#9998;</button>
              <button class="delete-btn" title="Delete" onclick="deletePost('${post.id}', event)">&#128465;</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderStats() {
      const bar = document.getElementById('statsBar');
      const totalPosts = posts.length;
      const totalWords = posts.reduce((sum, p) => sum + p.content.split(/\s+/).filter(w => w).length, 0);
      const allTags = [...new Set(posts.flatMap(p => p.tags))];

      // Calculate streak
      let streak = 0;
      if (totalPosts > 0) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const sortedDates = [...new Set(posts.map(p => {
          const d = new Date(p.date);
          d.setHours(0, 0, 0, 0);
          return d.getTime();
        }))].sort((a, b) => b - a);

        const todayTime = today.getTime();
        const oneDay = 86400000;

        if (sortedDates[0] >= todayTime - oneDay) {
          streak = 1;
          for (let i = 1; i < sortedDates.length; i++) {
            if (sortedDates[i - 1] - sortedDates[i] <= oneDay) {
              streak++;
            } else {
              break;
            }
          }
        }
      }

      bar.innerHTML = `
        <div class="stat">
          <div class="stat-value">${totalPosts}</div>
          <div class="stat-label">Posts</div>
        </div>
        <div class="stat">
          <div class="stat-value">${totalWords.toLocaleString()}</div>
          <div class="stat-label">Words</div>
        </div>
        <div class="stat">
          <div class="stat-value">${streak}</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat">
          <div class="stat-value">${allTags.length}</div>
          <div class="stat-label">Tags</div>
        </div>
      `;
    }

    // ── Helpers ──
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, color = '#10b981') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.background = color;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Keyboard shortcut ──
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        if (document.getElementById('editorView').style.display === 'block') {
          savePost();
        }
      }
      if (e.key === 'Escape') {
        if (document.getElementById('editorView').style.display === 'block' ||
            document.getElementById('readView').style.display === 'block') {
          showList();
        }
      }
    });

    // ── Init ──
    showList();
  </script>
</body>
</html>
