name: Daily Middle East News Report

on:
  schedule:
    # 6 AM PST = 2 PM UTC (adjust for daylight saving)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Generate Middle East News Report
        run: |
          cat > generate_report.js << 'EOF'
          const fs = require('fs');
          const https = require('https');
          
          const today = new Date().toISOString().split('T')[0];
          const reportFile = `MIDDLE_EAST_DAILY_REPORT_${today}.md`;
          
          const reportContent = `# Middle East Daily News & Market Impact Report

Generated: ${new Date().toISOString()}

## Executive Summary
Daily report on Middle East geopolitical developments and their impact on global trade and markets.

## Top 5 News Stories
[Generated by news aggregation service]

### Story 1: [Headline]
- **Region**: [Country]
- **Severity**: [Critical/High/Medium/Low]
- **Summary**: [2-3 sentence summary]

### Story 2-5: [Additional stories]

## Market Impact Analysis

### Energy Markets
- Oil Price Impact
- LNG Volatility
- Refinery Operations

### Currency Markets
- USD Strength
- Regional Currency Pressure
- Forex Volatility

### Stock Markets
- Regional Indices
- Sector Performance
- Volatility Index (VIX)

### Commodity Markets
- Precious Metals
- Agricultural Products
- Industrial Metals

### Supply Chain Impact
- Shipping Routes (Strait of Hormuz)
- Logistics Costs
- Supply Disruptions

## Risk Assessment
- **Overall Risk Level**: [1-10]
- **Market Volatility**: [Low/Medium/High/Critical]
- **Geopolitical Risk**: [Assessment]

## 48-72 Hour Outlook
[Short-term predictions]

## 1-2 Week Outlook
[Medium-term predictions]

## Investor Recommendations
- Action Items
- Monitoring Areas
- Risk Hedging Suggestions

## Source Attribution
- Reuters
- BBC
- Al Jazeera
- AP News
- Bloomberg

---
*Report generated automatically by GitHub Actions*
*Timestamp: ${new Date().toISOString()}*
`;
          
          fs.writeFileSync(reportFile, reportContent);
          console.log(`Report generated: ${reportFile}`);
          EOF
          node generate_report.js
      
      - name: Commit and push report
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add MIDDLE_EAST_DAILY_REPORT_*.md || true
          git commit -m "chore: add daily Middle East news report $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "Push failed - may have no commits"
        continue-on-error: true
      
      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Daily Middle East News & Market Impact Report"
          to: kamat.sanket@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Daily Middle East News & Market Impact Report
            Generated: $(date)
            
            Report Contents:
            - Top 5 news stories from Middle East region
            - Direct and indirect trade/market impacts
            - Stock market, currency, and commodity analysis
            - Risk assessment for investors and traders
            - Supply chain implications
            - 48-72 hour and 1-2 week outlooks
            
            For full details, visit the repository.
          attachments: |
            MIDDLE_EAST_DAILY_REPORT_*.md
